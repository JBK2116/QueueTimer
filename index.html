<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QueueTimer</title>
    <link rel="stylesheet" href="static/css/index.css" type="text/css">
</head>
<body>
    <nav class="nav">
        <a href="dashboard.html" class="logo">QueueTimer</a>
        <a href="auth/account.html" class="account-icon">👤</a>
    </nav>

    <div class="main-container">
        <header class="assignment-header">
            <h1 class="assignment-title">Create A New Session To Begin Tracking Your Time</h1>
            <div class="status-indicator">
                <div class="status-dot"></div>
                No Session in Progress
            </div>
        </header>

        <section class="timer-section">
            <div class="timer-display">00:00:00</div>
            
            <div class="timer-info">
                <div class="timer-info-item">
                    <div class="timer-info-label">Started</div>
                    <div class="timer-info-value">00:00:00</div>
                </div>
                <div class="timer-info-item">
                    <div class="timer-info-label">Elapsed</div>
                    <div class="timer-info-value">00:00:00</div>
                </div>
                <div class="timer-info-item">
                    <div class="timer-info-label">Est. End</div>
                    <div class="timer-info-value">00:00:00</div>
                </div>
            </div>
            
            <div class="timer-controls">
                <button class="btn">Stop</button>
                <button class="btn">Pause</button>
                <button class="btn btn-primary">New Session</button>
            </div>
        </section>
    </div>
    <script src="static/js/index.js"></script>
    <script src="static/js/app.js"></script>
</body>
</html>
