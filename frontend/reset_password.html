<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - QueueTimer</title>
    <link rel="stylesheet" href="css/reset_password.css" type="text/css">
</head>
<body>
    <nav class="nav">
        <a href="dashboard.html" class="logo">QueueTimer</a>
        <a href="account.html" class="account-icon">👤</a>
    </nav>

    <div class="main-container">
        <div class="reset-password-container">
            <header class="reset-password-header">
                <h1 class="reset-password-title">Set New Password</h1>
                <p class="reset-password-subtitle">Create a strong password to secure your account</p>
            </header>

            <form class="form" action="#" method="POST">
                <div class="form-group">
                    <label for="password1" class="form-label">New Password</label>
                    <input 
                        type="password" 
                        id="password1" 
                        name="password1" 
                        class="form-input" 
                        placeholder="Create a new password"
                        required
                        autocomplete="new-password"
                    >
                </div>

                <div class="form-group">
                    <label for="password2" class="form-label">Confirm Password</label>
                    <input 
                        type="password" 
                        id="password2" 
                        name="password2" 
                        class="form-input" 
                        placeholder="Confirm your new password"
                        required
                        autocomplete="new-password"
                    >
                </div>

                <div class="password-requirements">
                    <div class="requirements-title">Password Requirements</div>
                    <div class="requirements-list">
                        • At least 8 characters long<br>
                        • Contains uppercase and lowercase letters<br>
                        • Includes at least one number<br>
                        • Contains a special character
                    </div>
                </div>

                <button type="submit" class="btn-reset">Update Password</button>
            </form>

            <div class="auth-links">
                <div class="auth-text">Remember your password?</div>
                <a href="login.html" class="auth-link">Back to sign in</a>
            </div>
        </div>
    </div>
</body>
</html>
