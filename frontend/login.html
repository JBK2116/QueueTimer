<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - QueueTimer</title>
    <link rel="stylesheet" href="css/login.css" type="text/css">
</head>
<body>
    <nav class="nav">
        <a href="dashboard.html" class="logo">QueueTimer</a>
        <a href="account.html" class="account-icon">👤</a>
    </nav>

    <div class="main-container">
        <div class="login-container">
            <header class="login-header">
                <h1 class="login-title">Welcome Back</h1>
                <p class="login-subtitle">Sign in to continue your productivity journey</p>
            </header>

            <form class="form" action="#" method="POST">
                <div class="form-group">
                    <label for="email" class="form-label">Email Address</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        class="form-input" 
                        placeholder="Enter your email"
                        required
                        autocomplete="email"
                    >
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        class="form-input" 
                        placeholder="Enter your password"
                        required
                        autocomplete="current-password"
                    >
                </div>

                <div class="form-options">
                    <div class="checkbox-group">
                        <input 
                            type="checkbox" 
                            id="remember" 
                            name="remember" 
                            class="checkbox-input"
                        >
                        <label for="remember" class="checkbox-label">Remember me</label>
                    </div>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>

                <button type="submit" class="btn-login">Sign In</button>
            </form>

            <div class="auth-links">
                <p style="color: rgba(255, 255, 255, 0.7); margin-bottom: 0.5rem;">Don't have an account?</p>
                <a href="#" class="auth-link">Create one here</a>
            </div>
        </div>
    </div>
</body>
</html>
