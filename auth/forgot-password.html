<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - QueueTimer</title>
    <link rel="stylesheet" href="../static/css/forgot_password.css" type="text/css">
</head>
<body>
    <nav class="nav">
        <a href="../dashboard.html" class="logo">QueueTimer</a>
        <a href="account.html" class="account-icon">👤</a>
    </nav>

    <div class="main-container">
        <div class="forgot-password-container">
            <header class="forgot-password-header">
                <h1 class="forgot-password-title">Reset Password</h1>
                <p class="forgot-password-subtitle">Enter your email address and we'll send you a link to reset your password</p>
            </header>

            <form class="form" action="#" method="POST">
                <div class="form-group">
                    <label for="email" class="form-label">Email Address</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        class="form-input" 
                        placeholder="Enter your email"
                        required
                        autocomplete="email"
                    >
                    <div class="form-help">We'll send password reset instructions to this email</div>
                </div>

                <button type="submit" class="btn-reset">Send Reset Link</button>
            </form>

            <div class="auth-links">
                <div class="auth-text">Remember your password?</div>
                <a href="#" class="auth-link">Back to sign in</a>
                <div style="margin-top: 0.5rem;">
                    <span class="auth-text">Don't have an account? </span>
                    <a href="#" class="auth-link">Sign up</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
