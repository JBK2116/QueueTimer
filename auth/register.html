<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - QueueTimer</title>
    <link rel="stylesheet" href="../static/css/register.css" type="text/css">
</head>
<body>
    <nav class="nav">
        <a href="../dashboard.html" class="logo">QueueTimer</a>
        <a href="account.html" class="account-icon">👤</a>
    </nav>

    <div class="main-container">
        <div class="registration-container">
            <header class="registration-header">
                <h1 class="registration-title">Create Account</h1>
                <p class="registration-subtitle">Join QueueTimer to start tracking your productivity</p>
            </header>

            <form class="form" action="#" method="POST">
                <div class="form-group">
                    <label for="username" class="form-label">Username</label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        class="form-input" 
                        placeholder="Enter your username"
                        required
                        autocomplete="username"
                    >
                </div>

                <div class="form-group">
                    <label for="email" class="form-label">Email Address</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        class="form-input" 
                        placeholder="Enter your email"
                        required
                        autocomplete="email"
                    >
                </div>

                <div class="form-group">
                    <label for="password1" class="form-label">Password</label>
                    <input 
                        type="password" 
                        id="password1" 
                        name="password1" 
                        class="form-input" 
                        placeholder="Create a password"
                        required
                        autocomplete="new-password"
                    >
                </div>

                <div class="form-group">
                    <label for="password2" class="form-label">Confirm Password</label>
                    <input 
                        type="password" 
                        id="password2" 
                        name="password2" 
                        class="form-input" 
                        placeholder="Confirm your password"
                        required
                        autocomplete="new-password"
                    >
                </div>
                <button type="submit" class="btn-register">Create Account</button>
            </form>

            <div class="auth-links">
                <p style="color: rgba(255, 255, 255, 0.7); margin-bottom: 0.5rem;">Already have an account?</p>
                <a href="login.html" class="auth-link">Sign in here</a>
            </div>
        </div>
    </div>
</body>
</html>
